 {cat:"poet",d:4,verse:{ckb:"هەر کەسێک بڵێ «وا دێمەوە»\nبا بزانێ درۆ دەکات\nچونکە ئێمە تەنها بەڵێنێک بووین\nکە لە دەمماندا وشک بوو.",en:"Anyone who says 'I will come back' should know they are lying. Because we were only a promise that dried up on our lips.",by:"؟"},
   ckb:"شیعری «بۆنی خاک» کە بەڵێنی گەڕانەوەی دەکاتە درۆ، هی کام شاعیرە؟",en:"'The Smell of Soil', where the promise of return becomes a lie, is by which poet?",
   o:[["عەبدوللا پەشێو","Abdulla Pashew"],["شێرکۆ بێکەس","Sherko Bekas"],["هێمن موکریانی","Hemin Mukriyani"],["قەدریجان","Qedrîcan"]],c:0,
   fckb:"عەبدوللا پەشێو، جوگرافیای ڕۆحی دەربەدەری.",fen:"Abdulla Pashew — the geography of a soul in permanent transit."},

 {cat:"poet",d:4,verse:{ckb:"دەڵێی کۆتایی هات،\nبەڵام من هێشتا لە سەرەتای تامەزرۆییدا گیری خواردووم.\nوەکو گەڵایەک لە بەهەشتێکی ونبوودا،\nتەنها زەوییەک بە شێوەی تۆ دەبینم.",en:"You say the end has come, but I am still caught in the beginning of longing. Like a leaf in a lost paradise, I see only a piece of earth in the shape of you.",by:"؟"},
   ckb:"شیعری «تا ئەبەد» کە دڵدار لە یەکەم ساتی ئارەزوودا بەستراوەتەوە، هی کام شاعیرە؟",en:"'Until Eternity', where the lover is frozen at the first moment of longing, is by which poet?",
   o:[["جەلال مەلەکشا","Jalal Malaksha"],["عەبدوللا پەشێو","Abdulla Pashew"],["لەتیف هەڵمەت","Latif Halmat"],["شێرکۆ","Sherko"]],c:0,
   fckb:"جەلال مەلەکشا، زیندانی بێ کۆتاییی عەشق.",fen:"Jalal Malaksha — the infinite prison of a love that cannot move."},

 {cat:"poet",d:4,verse:{ckb:"دڵدار بە دڵی پڕ بە خەم و دەرد و بەڵامان\nوەک شەمعی شەوی تار، دەکوژێ و پەشیمان\nباسی سەری زولفی شەوی یەڵدایە مەکەن لێم\nمن خۆ لە سەری زولفی شەوی یەڵدا پەریشان",en:"A lover, heart full of sorrow, is like a candle on a dark night — it burns and repents. Do not speak to me of the tresses of the Yalda night, for I am already dishevelled by them.",by:"؟"},
   ckb:"ئەم غەزەلە کلاسیکییە کە زولفی دڵدار بە «شەوی یەڵدا» وەسف دەکات، هی کام شاعیرە؟",en:"This classical ghazal comparing the beloved's hair to the 'Yalda night' is by which poet?",
   o:[["نالی","Nalî"],["مەلای جزیری","Melayê Cizîrî"],["مەحوی","Mahwî"],["گۆران","Goran"]],c:0,
   fckb:"نالی، دامەزرێنەری شیعری کلاسیکی سۆرانی.",fen:"Nalî, founder of classical Sorani poetry."},

 {cat:"poet",d:4,verse:{ckb:"دەردی من تێ ناگەرێ بێ دەردی\nوا لە دەردا بوومە بێگانەیی دەرد\nچاوەکەم وا کەوریا، نازانێ\nچەندە شەرمەندە بە ئەڵماسی سەرد",en:"My pain doesn't reach the painless; I've become, in my pain, a stranger to pain itself. My eye has grown so blind it doesn't know how shamed it is by the diamond of the cold.",by:"؟"},
   ckb:"ئەم غەزەلە کە «بێگانەیی دەرد» دەردەبڕێت، هی کام شاعیری سۆفییە؟",en:"This ghazal of becoming 'a stranger to pain itself' is by which Sufi poet?",
   o:[["مەحوی","Mahwî"],["نالی","Nalî"],["مەلای جزیری","Cizîrî"],["شێرکۆ","Sherko"]],c:0,
   fckb:"مەحوی (مەلا هادی موکریانی)، شاعیری سۆفیانە.",fen:"Mahwî (Mala Hadi Mukriyani), a Sufi poet."},

 {cat:"poet",d:4,verse:{ckb:"سنوور\nئەی ئەو کەسەی دەتپەرستم و لێم ونی!\nتۆ خودا نی، تۆ خۆشەویستی منی\nتۆی لە من ون کرد و منی لە تۆ دوور\nئەو بستۆکەی دوژمن ناوی نا سنوور",en:"Border — the one whom I worshipped, taken from me; you are no God but my love. Who took her from me… nothing but the border the enemy set upon us.",by:"؟"},
   ckb:"شیعری «سنوور» کە نیشتمانی دابەشکراو دەکاتە دڵدارێکی ونبوو، هی کام شاعیرە؟",en:"'Border', which turns a divided homeland into a lost beloved, is by which poet?",
   o:[["هێمن موکریانی","Hemin Mukriyani"],["شێرکۆ بێکەس","Sherko Bekas"],["قەدریجان","Qedrîcan"],["نالی","Nalî"]],c:0,
   fckb:"هێمن موکریانی، شاعیری کۆماری مەهاباد (نووسراوی ١٩٧٢).",fen:"Hemin Mukriyani, poet laureate of the Mahabad Republic (written 1972)."},

 {cat:"poet",d:3,ckb:"هێمن موکریانی شاعیری دیاری کام دەسەڵاتی کوردی بوو؟",en:"Hemin Mukriyani was the poet laureate of which Kurdish state?",
   o:[["کۆماری مەهاباد","The Republic of Mahabad"],["هەرێمی کوردستان","Kurdistan Region"],["میرنشینی بۆتان","The Botan emirate"],["کۆماری ئارارات","Ararat republic"]],c:0,
   fckb:"کۆماری مەهاباد (١٩٤٦)، دواتر دەربەدەر بوو.",fen:"The Mahabad Republic (1946); later he lived in exile."},

 {cat:"poet",d:4,verse:{ckb:"خۆشترین ماچ\nئەو ماچەیە\nناگاتە دەم.\nخۆشترین شێعریش\nئەو شێعرەیە\nکە نانووسرێ بە قەڵەم.",en:"The sweetest kiss is the one that never happened. The sweetest poem is the one not yet written. The deepest sea is the one frozen in the heart.",by:"؟"},
   ckb:"شیعری «خۆشترین ماچ» کە خۆشی لە شتە نەبووەکاندا دەبینێت، هی کام شاعیرە؟",en:"'The Sweetest Kiss', finding beauty in the unrealized, is by which poet?",
   o:[["لەتیف هەڵمەت","Latif Halmat"],["عەبدوللا پەشێو","Abdulla Pashew"],["شێرکۆ","Sherko"],["جەلال مەلەکشا","Jalal Malaksha"]],c:0,
   fckb:"لەتیف هەڵمەت، شاعیری ڕاستەوخۆ و ناسک.",fen:"Latif Halmat, a poet of poignant directness."},

 {cat:"poet",d:4,verse:{ckb:"گوڵی سوور؛ هەستا بەرز؛ بۆنی دایە دەور…\nگوڵی سوور… گوڵی سوور…\nلە پشت چیای قاف گەشایەوە،\nجیهان بووی خۆشەویست…\nئێمە پێی ئازاد دەبین…",en:"The Red Rose; it rose high; its scent spread… It flourished behind Mount Qaf, the world was enamored with it… With it, we become free…",by:"؟"},
   ckb:"شیعری «گوڵی سوور» کە شۆڕش بە دڵداری دەشارێتەوە، هی کام شاعیرە؟",en:"'The Red Rose', a revolution disguised as a love lyric, is by which poet?",
   o:[["قەدریجان","Qedrîcan"],["هێمن","Hemin"],["شێرکۆ","Sherko"],["نالی","Nalî"]],c:0,
   fckb:"قەدریجان، پێشەنگی شیعری ئازادی نوێ بە کرمانجی.",fen:"Qedrîcan, a pioneer of modern free verse in Kurmanji."},

 {cat:"poet",d:4,verse:{ckb:"بەربەرەکانێی هەژاری و بێدەرەتانی و ئازار دەکەم.\nمن چاوی فریشتە خۆشناوێ…\nبەرد و گرد و لووتکەی لە هەوردا ونم خۆشدەوێ.\nبە هەموو هێزمەوە هاوار دەکەم: من کوردم.",en:"I challenge poverty, privation, pain. I do not love angel eyes… I love the rocks, the hills, the peaks lost among the clouds. With all my strength I scream: I am Kurdish.",by:"؟"},
   ckb:"شیعری «من کوردم» کە جوانیی نەرم ڕەتدەکاتەوە و چیا دەخۆشەوێت، هی کام شاعیرە؟",en:"'I Am Kurdish', rejecting soft beauty for the harsh mountains, is by which poet?",
   o:[["هێمن موکریانی","Hemin Mukriyani"],["قەدریجان","Qedrîcan"],["شێرکۆ","Sherko"],["نالی","Nalî"]],c:0,
   fckb:"هێمن موکریانی، لە سەردەمی کۆماری مەهاباد.",fen:"Hemin Mukriyani, from the Mahabad era."},

 {cat:"poet",d:4,verse:{ckb:"بەتەنیا نەبووم… شەو… لە تەنیشتم،\nتەرمێک ڕاکشابوو. کات… تەم، مژ و ناڵین بوو.\nوڵاتەکەشم مستەیەک تۆزی بەر با بوو.",en:"I was not alone… at night, beside me a corpse lay. Time was a fever, a fog, a lament. My homeland too was nothing but a speck of dust blown by the wind.",by:"؟"},
   ckb:"شیعری «بەتەنیا نەبووم» کە وڵات دەکاتە مستەیەک تۆز، هی کام شاعیرە؟",en:"'I Was Not Alone', reducing the homeland to a speck of dust, is by which poet?",
   o:[["ڕەفیق سابیر","Refîq Sabir"],["شێرکۆ","Sherko"],["هێمن","Hemin"],["لەتیف هەڵمەت","Latif Halmat"]],c:0,
   fckb:"ڕەفیق سابیر، دەنگی ئەنفال و هەڵەبجە.",fen:"Refîq Sabir, a voice of the Anfal and Halabja."},

 {cat:"poet",d:4,verse:{ckb:"ئەو گوڵە سپییانە مەنێژن هەتا دێم.\nچاوەڕێ بکەن! مەیاندەنە بێشکەی مێژوو.\nئاسمانی چاویان داخەن مەکەن، هەتا دێم.",en:"Don't bury those white flowers till I come. Wait! Don't give them up to the cradle of history. Don't close the sky of their eyes, till I come.",by:"؟"},
   ckb:"ئەم دێڕانە لە «دۆڵی پەپوولە» کە «گوڵە سپییەکان» تەرمی قوربانیانن، هی کام شاعیرە؟",en:"These lines from 'Butterfly Valley', where the 'white flowers' are the dead, are by which poet?",
   o:[["شێرکۆ بێکەس","Sherko Bekas"],["عەبدوللا پەشێو","Abdulla Pashew"],["ڕەفیق سابیر","Refîq Sabir"],["هێمن","Hemin"]],c:0,
   fckb:"شێرکۆ بێکەس، وەڵامی ئەنفال و هەڵەبجە.",fen:"Sherko Bekas, his response to Anfal and Halabja."},

 {cat:"poet",d:4,verse:{ckb:"وەرە هەیران، ئەرێ بابە هەیران\nپەرچەمت وەک هەزی کێوان دادەبارێ\nگەردنت زەردە، مەرجانیان پێ ناوێ\nدوو چاوی ڕەشکۆکەت، کلیان قەت ناوێ",en:"Come, my beloved, yes, my dear beloved — your hair cascades like the mountain vine; around your neck yellow corals glow; your two dark eyes have no equal in the world.",by:"؟"},
   ckb:"ئەم شیعرە کلاسیکییە کە عەشق دەکاتە نزا، هی کام شاعیری ژنی کرمانجە؟",en:"This classical poem turning love into prayer is by which woman Kurmanji poet?",
   o:[["هەیران (عەڤدرەحیم ڕەحمی)","Heyran (Evdirehîm Rehmî)"],["مەستوورەی ئەردەڵان","Mastura Ardalan"],["کەژاڵ ئەحمەد","Kajal Ahmad"],["چنار مەردۆخی","Chinar Mardokhy"]],c:0,
   fckb:"هەیران (١٨٥٦–١٩١٦)، دەنگێکی ژنی ناودار لە ئەدەبی کلاسیکی کرمانجی لە هەکاری.",fen:"Heyran (1856–1916), an iconic female voice of classical Kurmanji literature from Hakkari."},

 {cat:"poet",d:3,verse:{ckb:"… من لە کانیاوی خوێنەوە هاتووم …\nتەرمی سووتاوی ئافرەتێک لە هەڵەبجە،\nبوو بە پشکۆی تووڕەیی …",en:"…I have come from the spring of blood… the burnt-out corpse of a woman from Halabja, that became like ash-coal of anger…",by:"؟"},
   ckb:"ئەم شیعرە کە دەنگی ئافرەتی هەڵەبجە دەداتەوە، هی کام شاعیری هاوچەرخە؟",en:"This poem voicing a woman of Halabja is by which contemporary poet?",
   o:[["کەژاڵ ئیبراهیم خدر","Kazhal Ebrahim Khidre"],["چنار مەردۆخی","Chinar Mardokhy"],["هەیران","Heyran"],["مەستوورە","Mastura"]],c:0,
   fckb:"کەژاڵ ئیبراهیم خدر، دەنگی شایەتیی باشووری کوردستان.",fen:"Kazhal Ebrahim Khidre, a witness-voice from South Kurdistan."},

 {cat:"poet",d:3,ckb:"شاعیر «چنار مەردۆخی» لە شیعری «نیسانی سەرسوڕهێنەرم»دا نیسان دەکاتە چی؟",en:"In 'My Breath-taking April', how does Chinar Mardokhy portray April?",
   o:[["پارادۆکس: وەرزی نوێبوونەوە و هاوکات مەرگەساتی ئەنفال/هەڵەبجە","A paradox: renewal and the nightmare of Anfal/Halabja"],["تەنها وەرزی خۆشی","Only a happy season"],["وەرزی بازرگانی","A trading season"],["بێ واتا","Meaningless"]],c:0,
   fckb:"نیسان هاوکات «نوێبوونەوە» و «نایتمێر»ە — شایەتیی ئەنفال.",fen:"April is both renewal and 'nightmare' — a survivor's testimony of Anfal."},

 {cat:"poet",d:4,verse:{ckb:"ماریا، ئەگەر فاتیمەت بینی، پێی بڵێ\nهێشتا لێرەن، بکوژانی ئافرەتان، بە چەقۆوە، چاوەڕێ.\n… دوای مردنیشیان، شیعرە ئەپۆسەکانمان سووتاند …",en:"Maria, if you see Fatima, tell her: they are still here, the women-killers, with knives, waiting… after her death, we lit our epic poems on fire…",by:"؟"},
   ckb:"شیعری «ئەگەر فاتیمەت بینی» کە دژی کوشتنی ئافرەتانە، هی کام شاعیرە؟",en:"'If You See Fatima', a howl against femicide, is by which poet?",

/* ========== audio ========== */
let actx=null;
function beep(f,dur=.09,type="sine",vol=.16){if(!soundOn)return;try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(vol,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
  o.start();o.stop(actx.currentTime+dur);}catch(e){}}
const sClick=()=>beep(520,.05,"triangle",.1);
const sRight=()=>{beep(660,.08);setTimeout(()=>beep(990,.1),75);};
const sWrong=()=>beep(150,.2,"sawtooth",.14);
const sWin=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.14),i*110));
const sUp=()=>[392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.16),i*85));
const vibe=ms=>{if(navigator.vibrate)try{navigator.vibrate(ms);}catch(e){}};

/* ========== selection ========== */
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
/* a stable key for each question (so we can remember which were recently shown) */
function qKey(q){return (q.cat||"")+"|"+(q.en||"").slice(0,40);}
function seenSet(){return store.getJSON("seenQ",{});}
function markSeen(q){const s=seenSet();s[qKey(q)]=Date.now();
  // keep the map from growing unbounded: cap at 400 most-recent
  const ents=Object.entries(s);if(ents.length>400){ents.sort((a,b)=>b[1]-a[1]);const keep={};ents.slice(0,400).forEach(([k,v])=>keep[k]=v);store.setJSON("seenQ",keep);}
  else store.setJSON("seenQ",s);}
/* shuffle, but bias questions the user hasn't seen recently toward the front,
   so repeats across rounds are rare (true variety per user) */
function freshOrder(list){
  const seen=seenSet();
  const fresh=[],old=[];
  shuffle(list).forEach(q=>{(seen[qKey(q)]?old:fresh).push(q);});
  // oldest-seen first within the 'old' group
  old.sort((a,b)=>(seen[qKey(a)]||0)-(seen[qKey(b)]||0));
  return [...fresh,...old];
}
function seeded(a,seed){a=[...a];let s=seed||1;const r=()=>{s=(s*9301+49297)%233280;return s/233280;};
  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function prep(q){const order=shuffle([0,1,2,3]);return{...q,order,newC:order.indexOf(q.c)};}

/* ========== round engine ========== */
let timer=null,blitzTimer=null;
function startRound(mode,cat,deck){
  clearInterval(timer);clearInterval(blitzTimer);clearTimeout(autoNext);
  showLoader();
  setTimeout(()=>{
  const isDeck=mode==="deck";
  const isJoin=mode==="join";
  const cfg=isDeck?{count:Math.min(deck.length,20),hearts:3,time:25,ll:{fifty:1,skip:1,freeze:1}}
           :isJoin?{count:10,hearts:3,time:18,ll:{fifty:1,skip:1,freeze:1}}
           :mode==="category"?{count:8,hearts:3,time:20,ll:{fifty:1,skip:1,freeze:1}}
           :mode==="daily"?{count:8,hearts:3,time:20,ll:{fifty:1,skip:1,freeze:1}}
           :MODES[mode];
  let pool;
  if(isDeck||isJoin)pool=shuffle(deck);
  else if(mode==="daily")pool=seeded(Q,todayKey().split("-").reduce((a,b)=>a+ +b,0));
  else if(mode==="category")pool=freshOrder(Q.filter(q=>q.cat===cat));
  else if(mode==="deep"){
    // the special deep-history mode: deep + poetry + hardest history, hardest-weighted
    const deep=Q.filter(q=>q.cat==="deep"||q.cat==="poet"||((q.cat==="history"||q.cat==="geo"||q.cat==="language")&&q.d>=3));
    pool=freshOrder(deep);
  }
  else if(mode==="poetry"){
    pool=freshOrder(Q.filter(q=>q.cat==="poet"));
  }
  else if(mode==="ladder"){
    const e=shuffle(Q.filter(q=>q.d===1)),m=shuffle(Q.filter(q=>q.d===2)),h=shuffle(Q.filter(q=>q.d>=3));
    pool=[...e.slice(0,4),...m.slice(0,4),...h.slice(0,4)];
  } else pool=freshOrder(Q);

  state={mode,cat,cfg,deck,hearts:cfg.hearts||0,score:0,combo:0,bestCombo:0,correct:0,answered:0,
    ll:Object.assign({},cfg.ll),curTime:cfg.time,timeLeft:cfg.time,timeMax:cfg.time,
    ladderRung:-1,ladderSafe:0,blitzLeft:cfg.blitz||0,ended:false,answered_q:false};

  if(cfg.endless||cfg.blitz){state.queue=pool;state.qpos=0;state.reserve=[];}
  else{state.set=pool.slice(0,cfg.count);state.reserve=pool.slice(cfg.count);state.idx=0;}

  show("quiz");
  if(cfg.blitz)startBlitzClock();
  nextQuestion();
  hideLoader();
  },480);
}
function getRaw(){const c=state.cfg;
  if(c.endless||c.blitz){if(state.qpos>=state.queue.length){state.queue=shuffle(state.queue);state.qpos=0;}return state.queue[state.qpos++];}
  if(state.idx>=state.set.length)return null;return state.set[state.idx];}
function nextQuestion(){const c=state.cfg;
  if(c.hearts&&state.hearts<=0)return endRound();
  if(c.blitz&&state.blitzLeft<=0)return endRound();
  const raw=getRaw();if(!raw)return endRound();
  state.cur=prep(raw);state.answered_q=false;markSeen(raw);
  if(c.ramp)state.curTime=Math.max(7,c.time-Math.floor(state.answered/3));
  else if(!c.blitz)state.curTime=c.time;
  renderQuestion();
}
function heartsHTML(){const c=state.cfg;return `<div class="hearts">${[...Array(c.hearts)].map((_,i)=>`<span class="heart${i>=state.hearts?' lost':''}">${icon("heart")}</span>`).join("")}</div>`;}
function scoreHTML(){const c=state.cfg;
  if(c.blitz)return `<div class="qscore">${icon("check")}${state.correct}</div>`;
  const v=c.ladder?(state.ladderRung>=0?LADDER_PRIZES[state.ladderRung]:0):state.score;
  return `<div class="qscore">${icon("star")}${v}</div>`;}
function renderQuestion(){
  const q=state.cur,c=state.cfg;
  // poetry mode gets its own visual skin (this mode only)
  document.body.classList.toggle("poetic", state.mode==="poetry");
  $("nextBtn").style.display="none";$("factSlot").innerHTML="";
  $("qLeft").innerHTML=c.blitz?`<div class="blitzclock${state.blitzLeft<=10?' low':''}" id="blitzClock">${icon("clock")}${Math.ceil(state.blitzLeft)}s</div>`:(c.hearts?heartsHTML():"");
  $("qRight").innerHTML=scoreHTML();
  $("comboTxt").innerHTML=state.combo>=2?`${icon("flame")}<span>${lang==="ckb"?`زنجیرەی ${state.combo}`:`${state.combo} combo`}</span>`:"";
  if(c.ladder){
    const rows=LADDER_PRIZES.map((p,i)=>{const safe=c.checkpoints.includes(i);
      const cls=i===state.idx?"cur":(i<state.idx?"passed":(safe?"safe":""));
      return `<div class="rung ${cls}"><span class="lr">${safe?icon("lock"):""}${i+1}</span><span>${p}</span></div>`;}).join("");
    $("railSlot").innerHTML=`<div class="rail">${rows}</div>`;$("progWrap").style.display="none";
  }else{$("railSlot").innerHTML="";$("progWrap").style.display=c.blitz?"none":"block";
    if(!c.blitz&&!c.endless)$("progFill").style.width=(state.idx/state.set.length*100)+"%";
    else if(c.endless)$("progFill").style.width=Math.min(100,state.answered*4)+"%";}
  if(c.blitz)$("timeWrap").style.display="none";else{$("timeWrap").style.display="block";startTimer();}
  const cat=catOf(q.cat);
  $("qCat").innerHTML=cat?icon(cat.icon)+cat[lang]:"";
  $("qDiff").innerHTML=[1,2,3].map(n=>`<i class="${n<=q.d?'on':''}"></i>`).join("");
  // a verse, if present, is shown above the question in an ornate panel
  let head="";
  if(q.verse){head=`<div class="verse"><div class="vquote">${icon("quote")}</div>`+
    `<div class="vckb">${escapeHTML(q.verse.ckb||"")}</div>`+
    (q.verse.en?`<div class="ven">${escapeHTML(q.verse.en)}</div>`:"")+
    (q.verse.by?`<div class="vby">— ${escapeHTML(q.verse.by)}</div>`:"")+`</div>`;}
  $("qText").innerHTML=head+`<span class="qmain">${escapeHTML(lang==="ckb"?q.ckb:q.en)}</span>`;
  $("opts").innerHTML=q.order.map((orig,pos)=>{const key=["A","B","C","D"][pos];
    return `<button class="opt" data-pos="${pos}"><span class="k">${key}</span><span class="ot">${QT(q.o[orig])}</span><span class="kx"></span></button>`;}).join("");
  $("opts").querySelectorAll(".opt").forEach(b=>b.onclick=()=>answer(+b.dataset.pos));
  renderLifelines();
}
function renderLifelines(){
  const defs=[["fifty","scissors"],["skip","skip"],["freeze","timeplus"]];
  $("lifeBar").innerHTML=defs.filter(([k])=>state.cfg.ll[k]!==undefined).map(([k,ic])=>
    `<button class="life" data-ll="${k}" ${state.ll[k]<=0?'disabled':''}>${icon(ic)}<span>${T()[k]}</span><span class="lc">×${state.ll[k]}</span></button>`).join("");
  $("lifeBar").querySelectorAll(".life").forEach(b=>b.onclick=()=>useLifeline(b.dataset.ll));
}
function useLifeline(k){
  if(state.answered_q||state.ll[k]<=0)return;sClick();state.ll[k]--;
  if(k==="fifty"){const q=state.cur,wrong=q.order.map((o,p)=>p).filter(p=>p!==q.newC);
    shuffle(wrong).slice(0,2).forEach(p=>$("opts").children[p].classList.add("gone"));}
  else if(k==="skip"){if(state.reserve.length)state.cur=prep(state.reserve.shift());
    else if(state.cfg.endless||state.cfg.blitz)state.cur=prep(getRaw());renderQuestion();return;}
  else if(k==="freeze"){if(!state.cfg.blitz){state.timeLeft+=8;state.timeMax=Math.max(state.timeMax,state.timeLeft);}else state.blitzLeft+=8;}
  renderLifelines();
}
function startTimer(){
  clearInterval(timer);const fill=$("timeFill");state.timeMax=state.curTime;state.timeLeft=state.curTime;
  fill.style.transition="none";fill.style.width="100%";fill.style.background="var(--green)";void fill.offsetWidth;
  timer=setInterval(()=>{state.timeLeft-=.1;
    const pct=Math.max(0,Math.min(100,state.timeLeft/state.timeMax*100));
    fill.style.transition="width .1s linear";fill.style.width=pct+"%";
    fill.style.background=pct<35?"var(--red)":pct<60?"var(--gold)":"var(--green)";
    if(state.timeLeft<=0){clearInterval(timer);answer(-1);}},100);
}
function startBlitzClock(){clearInterval(blitzTimer);
  blitzTimer=setInterval(()=>{state.blitzLeft-=.1;const el=$("blitzClock");
    if(el)el.innerHTML=icon("clock")+Math.ceil(state.blitzLeft)+"s",el.classList.toggle("low",state.blitzLeft<=10);
    if(state.blitzLeft<=0){clearInterval(blitzTimer);endRound();}},100);}

function answer(pos){
  if(state.answered_q)return;state.answered_q=true;clearInterval(timer);
  const q=state.cur,c=state.cfg,opts=$("opts").querySelectorAll(".opt");
  const right=pos===q.newC;
  opts.forEach((b,i)=>{const kx=b.querySelector(".kx");
    if(i===q.newC){b.classList.add("correct");kx.innerHTML=icon("check");}
    else if(i===pos){b.classList.add("wrong");kx.innerHTML=icon("x");}
    else b.classList.add("dim");b.onclick=null;});
  if(right){state.correct++;state.combo++;state.bestCombo=Math.max(state.bestCombo,state.combo);sRight();vibe(20);
    if(c.blitz){state.score+=60*q.d+(state.combo-1)*10;state.blitzLeft+=2;}
    else if(c.ladder){state.ladderRung=state.idx;state.score=LADDER_PRIZES[state.idx];
      if(c.checkpoints.includes(state.idx))state.ladderSafe=LADDER_PRIZES[state.idx];}
    else{const tb=Math.round(Math.max(0,state.timeLeft)*3),cb=(state.combo-1)*25;state.score+=100*q.d+tb+cb;}
    if(c.hearts&&!c.ladder){const m=store.getJSON("mastery",{});m[q.cat]=(m[q.cat]||0)+1;store.setJSON("mastery",m);}
  }else{state.combo=0;sWrong();vibe(60);if(c.hearts)state.hearts--;if(c.blitz)state.blitzLeft=Math.max(0,state.blitzLeft-2);}
  state.answered++;
  $("qRight").innerHTML=scoreHTML();
  if(c.hearts)$("qLeft").innerHTML=heartsHTML();
  if(c.ladder&&!right){showFact(q);setTimeout(endRound,1200);return;}
  showFact(q);
  if(c.hearts&&state.hearts<=0){setTimeout(endRound,1200);return;}
  if(c.blitz){setTimeout(()=>{state.answered_q=false;nextQuestion();},620);return;}
  const last=(!c.endless&&state.idx>=state.set.length-1);
  $("nextLabel").textContent=last?T().toResult:(state.mode==="join"||state.mode==="ladder"||c.endless?T().nextRound:T().next);
  $("nextBtn").style.display="flex";
  // auto-advance after a short beat (manual tap still works and cancels the timer)
  clearTimeout(autoNext);autoNext=setTimeout(()=>{advanceQuestion();},1900);
}
function advanceQuestion(){clearTimeout(autoNext);
  if(state.ended||state.answered_q===false)return;
  state.answered_q=false;if(!state.cfg.endless&&!state.cfg.blitz)state.idx++;nextQuestion();}
function showFact(q){if(state.cfg.blitz)return;

$("quitBtn").onclick=()=>{sClick();clearTimeout(autoNext);clearInterval(timer);clearInterval(blitzTimer);show("home");renderHome();};

/* ========== result ========== */
function endRound(){
  if(state.ended)return;state.ended=true;clearInterval(timer);clearInterval(blitzTimer);
  const c=state.cfg;
  let finalScore=state.score;
  if(c.ladder){finalScore=state.ladderRung>=0?LADDER_PRIZES[state.ladderRung]:0;if(state.hearts<=0)finalScore=state.ladderSafe;}
  const acc=state.answered?Math.round(state.correct/state.answered*100):0;
  const ladderDone=c.ladder&&state.ladderRung===LADDER_PRIZES.length-1;
  store.set("played",(+(store.get("played")||0))+state.correct);
  let best=+(store.get("best")||0),isBest=false;
  if(finalScore>best){store.set("best",finalScore);isBest=true;}
  if(state.mode==="daily"){handleStreak();store.set("dailyDone",todayKey());}
  const xpBefore=+store.get("xp")||0,riBefore=rankIndex(xpBefore);
  const xpGain=Math.round(finalScore/8)+state.correct*5;
  const xpAfter=xpBefore+xpGain;store.set("xp",xpAfter);const riAfter=rankIndex(xpAfter);
  let placed=0;const lb=store.getJSON("lb",[]);
  const isJoin=state.mode==="join";
  const playerNm=isJoin?(joinPlayer||profileName()):profileName();
  if(finalScore>0){lb.push({s:finalScore,m:state.mode,d:todayKey(),n:playerNm,mq:isJoin&&joinMosque?(lang==="ckb"?joinMosque.ckb:joinMosque.en):""});lb.sort((a,b)=>b.s-a.s);
    const top=lb.slice(0,8);store.setJSON("lb",top);placed=top.findIndex(x=>x.s===finalScore&&x.d===todayKey())+1;if(placed>3)placed=0;}
  if(isJoin)submitJoinResult(finalScore,state.correct,state.answered);
  checkAchievements({mode:state.mode,acc,bestCombo:state.bestCombo,score:finalScore,correct:state.correct,answered:state.answered,ladderDone});

  const ring=$("resultRing"),rad=52,circ=2*Math.PI*rad;
  ring.innerHTML=`<circle cx="60" cy="60" r="${rad}" fill="none" stroke="rgba(244,236,218,.08)" stroke-width="10"/>
    <circle cx="60" cy="60" r="${rad}" fill="none" stroke="#f5c518" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${circ}" stroke-dashoffset="${circ}" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s var(--ease);"/>
    <text x="60" y="68" text-anchor="middle" font-size="26" font-weight="800" fill="#f4ecda" font-family="Avenir Next,sans-serif">${acc}%</text>`;
  setTimeout(()=>ring.querySelectorAll("circle")[1].setAttribute("stroke-dashoffset",circ*(1-acc/100)),80);
  $("rTitle").textContent=acc===100?T().rPerfect:acc>=70?T().rGreat:acc>=40?T().rGood:T().rOk;
  $("rScore").textContent=finalScore;
  $("rScoreSub").textContent=state.mode==="survival"?T().survived(state.answered):state.mode==="blitz"?T().blitzRes(state.correct):T().points;
  let pills="";
  if(isBest)pills+=`<span class="pill best">${icon("trophy")}${T().newBest}</span>`;
  if(placed)pills+=`<span class="pill lb">${icon("chart")}${T().lbPlace(placed)}</span>`;
  if(riAfter>riBefore)pills+=`<span class="pill rank">${icon("crown")}${RANKS[riAfter][lang]}</span>`;

function confetti(){const cv=$("confetti");cv.style.display="block";const ctx=cv.getContext("2d");
  cv.width=innerWidth;cv.height=innerHeight;const cols=["#f5c518","#e23b34","#27a35a","#fff","#e0a72e"];
  const P=Array.from({length:140},()=>({x:Math.random()*cv.width,y:-20-Math.random()*cv.height,s:5+Math.random()*7,
    c:cols[Math.floor(Math.random()*cols.length)],vy:2+Math.random()*4,vx:-2+Math.random()*4,rot:Math.random()*6,vr:-.2+Math.random()*.4}));
  let f=0;(function loop(){f++;ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.6);ctx.restore();});
    if(f<170)requestAnimationFrame(loop);else cv.style.display="none";})();}

const BAD=["fuck","fuk","fck","shit","sht","bitch","btch","cunt","dick","cock","pussy","penis","vagina","whore","slut",
"bastard","asshole","ass","arse","nigger","nigga","fag","faggot","retard","sex","sexy","porn","rape","nazi","hitler",

"خرا","لعنة","كافر","منيك","kir","kus","qun","gun","qun","xirre"];
function normalizeName(s){return (s||"").toLowerCase()
  .replace(/[@4]/g,"a").replace(/[0]/g,"o").replace(/[1!|]/g,"i").replace(/[3]/g,"e")
  .replace(/[5$]/g,"s").replace(/[7]/g,"t").replace(/[8]/g,"b").replace(/[^a-z\u0600-\u06ff]/g,"");}
function isCleanName(s){const n=normalizeName(s);if(!n)return true;
  // long words: substring match; very short words (<4): only block exact matches (avoids "class"→"ass")
  return !BAD.some(w=> w.length>=4 ? n.includes(w) : n===w);}
function validName(raw){const s=(raw||"").trim();
  if(s.length<4)return {ok:false,msg:T().nameShort};
  if(s.length>8)return {ok:false,msg:T().nameLong};
  if(!/^[\p{L}\p{N}]+$/u.test(s))return {ok:false,msg:T().nameChars};
  if(!isCleanName(s))return {ok:false,msg:T().nameBad};
  return {ok:true};}

function aggregateByMosque(results){
  const map={};
  results.forEach(x=>{const k=x.mosque_id||x.mosque||"-";
    if(!map[k])map[k]={mosque:x.mosque,mosque_ckb:x.mosque_ckb,best:0,bestPlayer:"",total:0,count:0,players:{}};
    const m=map[k];m.count++;m.total+=(+x.score||0);
    m.players[x.player]=Math.max(m.players[x.player]||0,+x.score||0);
    if((+x.score||0)>m.best){m.best=+x.score||0;m.bestPlayer=x.player;}});
  return Object.values(map).sort((a,b)=>b.best-a.best||b.total-a.total);
}

/* Gemini REST call. Accepts either a parts[] (single user turn) or a
   full contents[] array (multi-turn chat). opts: {text, temp, maxTokens, system, contents} */
async function callGemini(parts,opts){
  opts=opts||{};
  const gc={temperature:opts.temp!=null?opts.temp:.7};
  if(!opts.text)gc.responseMimeType="application/json";
  gc.maxOutputTokens=opts.maxTokens||1400;
  const contents=opts.contents||[{role:"user",parts}];
  const body={contents,generationConfig:gc};
  if(opts.system)body.systemInstruction={parts:[{text:opts.system}]};
  let res;
  if(CONFIG.PROXY_URL){
    res=await fetch(CONFIG.PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(Object.assign({model:CONFIG.MODEL},body))});
  }else{
    const key=getKey();if(!key)throw new Error("nokey");
    const base=`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL}:generateContent`;
    const payload=JSON.stringify(body);
    // header auth first (works for AQ.* keys), query-param as fallback (works for AIza* keys)
    res=await fetch(base,{method:"POST",headers:{"Content-Type":"application/json","X-goog-api-key":key},body:payload});
    if(!res.ok&&(res.status===400||res.status===401||res.status===403)){
      try{const r2=await fetch(base+`?key=${encodeURIComponent(key)}`,{method:"POST",headers:{"Content-Type":"application/json"},body:payload});
        if(r2.ok||r2.status!==res.status)res=r2;}catch(_){}
    }
  }
  if(!res.ok){let detail="";try{const j=await res.json();detail=(j.error&&j.error.message)||"";}catch(_){}
    throw new Error("http "+res.status+(detail?": "+detail.slice(0,120):""));}
  const data=await res.json();
  const txt=(data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts||[])
    .map(p=>p.text||"").join("");
  if(!txt)throw new Error("empty");
  return txt;
}
function parseDeck(txt){
  let clean=txt.trim().replace(/^```(json)?/i,"").replace(/```$/,"").trim();
  const s=clean.indexOf("["),e=clean.lastIndexOf("]");if(s>=0&&e>=0)clean=clean.slice(s,e+1);
  const arr=JSON.parse(clean);
  return arr.map(it=>{
    const opts=(it.options||it.o||[]).slice(0,4).map(o=>typeof o==="string"?[o,o]:[o.ckb||o.en||"",o.en||o.ckb||""]);
    while(opts.length<4)opts.push(["—","—"]);
    const ckb=it.ckb||it.q_ckb||it.question||it.en||"",en=it.en||it.q_en||it.question||it.ckb||"";
    let c=+(it.correct!=null?it.correct:it.c);if(isNaN(c)||c<0||c>3)c=0;
    return {cat:"student",d:Math.min(3,Math.max(1,+it.d||+it.difficulty||1)),
      ckb,en,o:opts,c,fckb:it.fact_ckb||it.fckb||it.fact||"",fen:it.fact_en||it.fen||it.fact||""};
  }).filter(q=>q.ckb&&q.o.length===4);
}

/* shrink images so requests are fast & within limits */
function downscaleImage(file,cb){
  const r=new FileReader();
  r.onload=()=>{const img=new Image();
    img.onload=()=>{const max=1280;let w=img.width,h=img.height;
      if(w>max||h>max){if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      const dataURL=cv.toDataURL("image/jpeg",.85);
      cb({dataURL,b64:dataURL.split(",")[1],mime:"image/jpeg"});};
    img.onerror=()=>cb(null);img.src=r.result;};
  r.onerror=()=>cb(null);r.readAsDataURL(file);
}
